spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 1091577412614-3fr0ubc3mllrfr9jc2gt0m8rue2e8n5m.apps.googleusercontent.com
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.CockroachDialect
        jdbc:
          lob:
            non_contextual_creation: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://project-tanuki.net}
  frontend-url: ${GOOGLE_REDIRECT_URI:https://project-tanuki.net}

logging:
  level:
    root: INFO
    io.github.peterberghuis: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR
